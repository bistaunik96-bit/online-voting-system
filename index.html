<!DOCTYPE html>
<html>
<head>
    <title>Live Voting Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; justify-content: center; align-items: center;
        }
        .container {
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.15);
            padding:30px;
            border-radius:20px;
            width:420px;
            color:white;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            animation:fadeIn 1s ease;
        }
        @keyframes fadeIn { from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }
        h1 { text-align:center; margin-bottom:20px; font-weight:700; }
        .candidate { margin:15px 0; position:relative; }
        label { cursor:pointer; }
        input[type="radio"] { margin-right:8px; transform:scale(1.2); }
        .bar { height:12px; background: rgba(255,255,255,0.2); border-radius:12px; margin-top:6px; overflow:hidden; }
        .fill { height:100%; width:0%; border-radius:12px; transition: width 0.6s ease-in-out; }
        .stats { font-size:13px; margin-top:3px; }
        button {
            width:100%; padding:12px; border:none; border-radius:10px; margin-top:10px;
            font-size:15px; cursor:pointer; transition:0.3s;
        }
        #voteBtn { background: linear-gradient(to right,#00c6ff,#0072ff); color:white; }
        #voteBtn:hover { transform:scale(1.05); }
        #voteBtn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
        #result { margin-top:15px; text-align:center; font-weight:bold; font-size:16px; }
        .winner { text-shadow: 0 0 10px gold,0 0 20px gold; color:#ffd700; }
        #status { text-align:center; font-size:12px; margin-bottom:10px; opacity:0.8; }
    </style>
</head>
<body>
<div class="container">
    <h1>🗳 Live Voting Dashboard</h1>
    <div id="status">Connecting...</div>
    <div id="candidatesContainer"></div>
    <button id="voteBtn" onclick="vote()">🚀 Submit Vote</button>
    <div id="result"></div>
</div>

<script>
    const candidates = ["Balen Shah","KP Oli","Prachanda","Ramesh","Sita"];
    const colors = ["#ff6b6b","#4ecdc4","#ffe66d","#ff9f1c","#9b5de5","#00bbf9"];

    const container = document.getElementById("candidatesContainer");
    const statusEl = document.getElementById("status");
    let ws;
    let hasVoted = false;

    candidates.forEach((name,i)=>{
        const div = document.createElement("div");
        div.className="candidate";
        div.innerHTML=`
            <label><input type="radio" name="vote" value="${i}"> ${name}</label>
            <div class="bar"><div id="bar${i}" class="fill" style="background:${colors[i%colors.length]}"></div></div>
            <div id="count${i}" class="stats">0 votes (0%)</div>
        `;
        container.appendChild(div);
    });

    function updateUI(votes){
        let total = votes.reduce((a,b)=>a+b,0);
        let max = Math.max(...votes);
        let winnerIndex = votes.indexOf(max);

        candidates.forEach((_,i)=>{
            let percent = total===0?0:(votes[i]/total)*100;
            document.getElementById("bar"+i).style.width=percent+"%";
            document.getElementById("count"+i).innerHTML=votes[i]+" votes ("+percent.toFixed(1)+"%)";
        });

        if(total>0){
            document.getElementById("result").innerHTML=
                "🏆 Leading: <span class=\"winner\">"+candidates[winnerIndex]+"</span>";
        } else {
            document.getElementById("result").innerHTML="";
        }
    }

    function connect(){
        ws = new WebSocket("wss://https://online-voting-system-thxi.onrender.com/ws");

        ws.onopen = function(){
            statusEl.textContent = "🟢 Connected";
        };

        ws.onmessage = function(event){
            const msg = JSON.parse(event.data);
            if(msg.type === "votes"){
                updateUI(msg.data);
            } else if(msg.type === "error"){
                document.getElementById("result").innerHTML="❌ "+msg.message;
                hasVoted = true;
                document.getElementById("voteBtn").disabled=true;
                disableRadios();
            }
        };

        ws.onclose = function(){
            statusEl.textContent = "🔴 Disconnected — reconnecting...";
            setTimeout(connect, 2000);
        };

        ws.onerror = function(){
            statusEl.textContent = "🔴 Connection error";
        };
    }

    function disableRadios(){
        document.querySelectorAll('input[name="vote"]').forEach(r=>r.disabled=true);
    }

    function vote(){
        if(hasVoted){
            document.getElementById("result").innerHTML="❌ You already voted!";
            return;
        }
        const radios = document.getElementsByName("vote");
        let index = -1;
        for(let i=0;i<radios.length;i++){ if(radios[i].checked) index=i; }
        if(index===-1){ document.getElementById("result").innerHTML="⚠ Select a candidate!"; return; }

        ws.send(JSON.stringify({"type":"vote","candidate":index}));
        hasVoted = true;
        document.getElementById("voteBtn").disabled=true;
        disableRadios();
    }

    connect();
</script>
</body>
</html>
