<!DOCTYPE html>
<html>
<head>
    <title>Pro Voting System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            margin: 0;

            background:
                linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                url('https://upload.wikimedia.org/wikipedia/commons/6/6e/Nepal_Parliament_Building.jpg');

            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .box {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            width: 400px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px;
            width: 95%;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        .bar {
            height: 10px;
            background: rgba(255,255,255,0.2);
            margin-top: 5px;
            border-radius: 5px;
        }

        .fill {
            height: 100%;
            width: 0%;
            background: #00c6ff;
        }
    </style>
</head>

<body>

<div class="box" id="loginBox">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Enter username">
    <button onclick="login()">Login</button>
</div>

<div class="box" id="voteBox" style="display:none;">
    <h2>🗳 Vote</h2>

    <label><input type="radio" name="vote"> Balen Shah</label>
    <div class="bar"><div id="b1" class="fill"></div></div>

    <label><input type="radio" name="vote"> KP Oli</label>
    <div class="bar"><div id="b2" class="fill"></div></div>

    <label><input type="radio" name="vote"> Prachanda</label>
    <div class="bar"><div id="b3" class="fill"></div></div>

    <button onclick="vote()">Submit Vote</button>
    <p id="msg"></p>
</div>

<script>
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT.firebaseio.com",
    projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = "";

function login(){
    user = document.getElementById("username").value;

    if(user==""){
        alert("Enter username");
        return;
    }

    localStorage.setItem("user", user);

    document.getElementById("loginBox").style.display="none";
    document.getElementById("voteBox").style.display="block";

    checkVote();
}

function checkVote(){
    db.ref("users/"+user).once("value", snap=>{
        if(snap.exists()){
            document.getElementById("msg").innerHTML="❌ You already voted!";
        }
    });
}

function vote(){
    let radios=document.getElementsByName("vote");
    let index=-1;

    for(let i=0;i<radios.length;i++){
        if(radios[i].checked) index=i;
    }

    if(index==-1){
        document.getElementById("msg").innerHTML="Select a candidate!";
        return;
    }

    db.ref("users/"+user).once("value", snap=>{
        if(snap.exists()){
            document.getElementById("msg").innerHTML="❌ Already voted!";
        } else {

            db.ref("votes").transaction(v=>{
                if(v==null) v=[0,0,0];
                v[index]++;
                return v;
            });

            db.ref("users/"+user).set(true);
            document.getElementById("msg").innerHTML="✅ Vote submitted!";
        }
    });
}

// LIVE RESULT
db.ref("votes").on("value", snap=>{
    let v=snap.val()||[0,0,0];
    let total=v.reduce((a,b)=>a+b,0);

    for(let i=0;i<3;i++){
        let p= total==0?0:(v[i]/total)*100;
        document.getElementById("b"+(i+1)).style.width=p+"%";
    }
});
</script>

</body>
</html>
