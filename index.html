<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Voting System</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 420px;
            margin: auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
        }

        .candidate {
            margin: 10px 0;
            font-size: 18px;
            text-align: left;
        }

        .bar {
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin-top: 5px;
        }

        .fill {
            height: 10px;
            background: #4facfe;
            border-radius: 5px;
            width: 0%;
        }

        button {
            background: #4facfe;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #00c6ff;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            color: green;
        }

        .winner {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Online Voting System</h1>

    <div class="candidate">
        <input type="radio" name="vote" value="Balen Shah"> Balen Shah
        <div class="bar"><div id="bar1" class="fill"></div></div>
        <span id="count1"></span>
    </div>

    <div class="candidate">
        <input type="radio" name="vote" value="KP Oli"> KP Oli
        <div class="bar"><div id="bar2" class="fill"></div></div>
        <span id="count2"></span>
    </div>

    <div class="candidate">
        <input type="radio" name="vote" value="Prachanda"> Prachanda
        <div class="bar"><div id="bar3" class="fill"></div></div>
        <span id="count3"></span>
    </div>

    <button id="voteBtn" onclick="vote()">Vote</button>
    <button onclick="resetVotes()">Reset</button>

    <div id="result"></div>
</div>

<script>
    let candidates = ["Balen Shah", "KP Oli", "Prachanda"];

    function getVotes() {
        let votes = JSON.parse(localStorage.getItem("votes"));
        if (!votes) {
            votes = [0, 0, 0];
        }
        return votes;
    }

    function saveVotes(votes) {
        localStorage.setItem("votes", JSON.stringify(votes));
    }

    function updateUI() {
        let votes = getVotes();
        let total = votes.reduce((a, b) => a + b, 0);

        for (let i = 0; i < votes.length; i++) {
            let percent = total === 0 ? 0 : (votes[i] / total) * 100;

            document.getElementById("count" + (i+1)).innerHTML =
                votes[i] + " votes (" + percent.toFixed(1) + "%)";

            document.getElementById("bar" + (i+1)).style.width =
                percent + "%";
        }

        // Highlight winner
        let max = Math.max(...votes);
        let winnerIndex = votes.indexOf(max);

        if (total > 0) {
            document.getElementById("result").innerHTML =
                "🏆 Leading: " + candidates[winnerIndex];
        }
    }

    function vote() {
        if (localStorage.getItem("voted") === "true") {
            document.getElementById("result").innerHTML =
                "You already voted!";
            return;
        }

        let options = document.getElementsByName("vote");
        let selectedIndex = -1;

        for (let i = 0; i < options.length; i++) {
            if (options[i].checked) {
                selectedIndex = i;
            }
        }

        if (selectedIndex === -1) {
            document.getElementById("result").innerHTML =
                "Select a candidate!";
            return;
        }

        let votes = getVotes();
        votes[selectedIndex]++;
        saveVotes(votes);

        localStorage.setItem("voted", "true");

        document.getElementById("voteBtn").disabled = true;

        updateUI();
    }

    function resetVotes() {
        localStorage.clear();
        location.reload();
    }

    window.onload = function () {
        updateUI();

        if (localStorage.getItem("voted") === "true") {
            document.getElementById("voteBtn").disabled = true;
        }
    };
</script>

</body>
</html>
